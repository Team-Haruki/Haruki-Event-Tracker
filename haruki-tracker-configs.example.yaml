# Haruki Event Tracker 配置文件
# Version: 2.0
# ============================================================================
# 说明：
# 1. 本文件为配置示例，请复制为 haruki-tracker-configs.yaml 后使用
# 2. 修改配置后需要重启服务才能生效
# 3. Rust 版本支持通过 HARUKI_CONFIG_URI 或 --config 指定配置文件位置；
#    该位置可以是本地路径、file:// URI，或已编译 OpenDAL service 的 URI。
# ============================================================================

# ============================================================================
# Redis 配置
# ============================================================================
# 用途：缓存 API 返回的 Border 数据，避免重复记录相同的数据
# 注意：Redis 是必须的组件，请确保已正确安装并运行 Redis 服务器
redis:
  host: localhost            # Redis 服务器地址
  port: 6379                 # Redis 服务器端口
  password: ""               # Redis 密码（如无密码请留空）

# ============================================================================
# API Redis 缓存配置
# ============================================================================
# 用途：Tracker 和 API 共享同一个 Redis 时，API 可以用短 TTL 降低热查询压力；
#      Tracker 每次成功写入后会 bump event 级 epoch，让旧缓存立即失效。
# 注意：redis_url 留空时复用上面的 redis 配置；TTL 为 0 时使用 default_ttl_secs。
api_cache:
  enabled: false
  redis_url: ""              # 例如 redis://:password@redis:6379/0；留空复用 redis.host/port/password
  pool_size: 2               # API cache Redis 连接池大小；生产热点可从 4 起观察
  command_timeout_ms: 100    # Redis cache 命令超时；超时后降级查库/回填
  local_control_ttl_ms: 100  # event epoch/dirty 本地短缓存
  local_value_ttl_ms: 250    # API value 本地短缓存；0 表示禁用 L1 value
  local_max_entries: 4096
  precompress_gzip_enabled: true # 热点 trace JSON 是否缓存 gzip 预压缩响应
  precompress_min_bytes: 4096    # 原始 JSON 小于该值时不预压缩
  gzip_level: 1                  # 预压缩 gzip 等级；1 优先降低 CPU
  default_ttl_secs: 2
  latest_rank_ttl_secs: 1
  trace_rank_ttl_secs: 60
  batch_trace_rank_ttl_secs: 60 # 兼容旧配置；开启缓存时 batch trace 会拆成单 rank cache
  user_data_ttl_secs: 30
  replay_overview_ttl_secs: 3600 # 带 at 的回放 overview 缓存；不受 tracker epoch/dirty 控制
  negative_ttl_secs: 10       # 404 rank 的短期负缓存；0 表示禁用
  max_value_bytes: 1048576
  batch_max_value_bytes: 4194304 # batch trace 整包缓存上限；超过则本次返回但不写缓存

# ============================================================================
# API 查询限流配置
# ============================================================================
# 用途：限制重型 trace 查询的并发，避免缓存 miss 或 dirty 窗口把数据库打满。
api_query:
  trace_per_server_max_concurrency: 8
  trace_global_max_concurrency: 32
  acquire_timeout_ms: 1500
  batch_trace_fill_concurrency: 4

# ============================================================================
# Toolbox 私有查询校验配置
# ============================================================================
# 用途：/event/.../private/... raw UID 查询会先调用 Toolbox 当前用户接口，
#      校验 Oathkeeper/Kratos 登录身份是否绑定了目标区服 UID。
# 注意：留空时 private UID 查询会返回 503，避免退回到“登录即可查任意 UID”。
toolbox:
  base_url: ""               # 例如 http://toolbox-backend:16666
  auth_proxy_secret: ""      # Toolbox 后端 AUTH_PROXY_TRUSTED_VALUE / Oathkeeper shared secret
  authorization: ""          # 如需兼容旧内部鉴权可填写 Authorization 完整值，通常留空
  user_agent: "Haruki-Event-Tracker/private-lookup"

# ============================================================================
# 后端 API 服务器配置
# ============================================================================
# 用途：提供 HTTP/HTTPS API 接口供前端或其他服务调用
backend:
  host: 0.0.0.0              # 监听地址（0.0.0.0 表示监听所有网络接口）
  port: 8080                 # 监听端口

  # SSL/HTTPS 配置
  ssl: false                 # 是否启用 HTTPS（生产环境建议启用）
  ssl_cert: ""               # SSL 证书文件路径（启用 SSL 时必填）
  ssl_key: ""                # SSL 私钥文件路径（启用 SSL 时必填）

  # 日志配置
  log_level: INFO            # 日志级别：DEBUG, INFO, WARN, ERROR, CRITICAL
  main_log_file: logs/haruki-tracker.log  # 主日志文件路径

  # 访问日志配置
  access_log: "${time} | ${status} | ${latency} | ${ip} | ${method} ${path}\n"  # 访问日志格式
  access_log_path: logs/access.log  # 访问日志文件路径（留空则输出到 stdout）

  # 可信代理配置（如使用反向代理请根据实际情况调整）
  enable_trust_proxy: true  # 是否启用可信代理
  trusted_proxies:         # 可信代理 IP 段列表
    - "127.0.0.0/8"
    - "::1/128"
    - "192.168.0.0/16"
    - "172.16.0.0/12"
    - "100.64.0.0/10"
    - "10.0.0.0/8"
  proxy_header: "X-Forwarded-For" # 用于获取客户端真实 IP 的请求头

# ============================================================================
# Sekai API 配置
# ============================================================================
# 用途：从 Haruki Sekai API 获取排名数据
# 注意：需要有效的 API Token 才能使用，但是如果是自建 Haruki Sekai API 则可能不需要
sekai_api:
  api_endpoint: ""  # API 端点地址
  api_token: "YOUR_API_TOKEN_HERE"  # API 访问令牌（请替换为实际的 Token）

# ============================================================================
# 服务器配置
# ============================================================================
# 说明：每个游戏服务器都有独立的配置
# 支持的服务器：jp（日服）、en（国际服）、tw（台服）、kr（韩服）、cn（国服）
servers:
  # ----------------------------------------------------------------------------
  # 日本服务器 (JP)
  # ----------------------------------------------------------------------------
  jp:
    enabled: false           # 是否启用该服务器的追踪（true/false）
    master_data_dir: data/haruki-sekai-master/master  # 游戏 Master 数据目录路径，也可使用 OpenDAL URI，如 s3://bucket/jp/master?region=ap-northeast-1

    # tracker配置
    tracker:
      enabled: true         # 是否启用活动追踪器
      use_second_level_cron: false  # 是否启用秒级 Cron 表达式
      cron: "*/2 * * * *"   # Cron 表达式，默认每 2 分钟执行一次
      post_end_user_refresh_interval_secs: 3600 # 活动结束后低频刷新用户资料的间隔（秒）
      second_level_track_type: "range" # 秒级追踪类型：range（范围排名），specific（指定排名）
      # =========== 当 second_level_track_type 为 range 时生效 ============
      range_track_lower_rank: 1    # 范围追踪高顺位排名（仅当 type 为 range 时有效，可与upper调转）
      range_track_upper_rank: 10 # 范围追踪低顺位排名（仅当 type 为 range 时有效，可与lower调转）
      # ========== 当 second_level_track_type 为 specific 时生效 ==========
      specific_track_ranks: null  # 指定排名列表（仅当 type 为 specific 时有效，为null或[]时不生效）
      track_specific_players: false  # 是否追踪指定玩家
      specific_player_user_ids: null  # 指定玩家 User ID 列表（仅当 track_specific_players 为 true 时有效，为null或[]时不生效，类型为string）

    # 数据库配置（GORM）
    gorm_config:
      enabled: true          # 是否启用数据库（禁用则不会记录数据）
      dialect: postgres      # 数据库类型：mysql, postgres, sqlite

      # 数据源名称（DSN）- 根据不同数据库类型格式不同：
      # PostgreSQL: "postgres://username:your_password@localhost:5432/database_name?sslmode=disable"
      # MySQL:      "mysql://username:password@localhost:3306/database_name?charset=utf8mb4"
      # SQLite:     "file:./data.db?cache=shared&mode=rwc"
      dsn: "postgres://haruki_user:YOUR_PASSWORD_HERE@localhost:5432/haruki_tracker_jp?sslmode=disable"

      # 连接池配置
      max_open_conns: 20     # 最大打开连接数（建议 10-50；多区服同库时保持保守）
      max_idle_conns: 1      # 最小/空闲连接数（Rust 版本映射为 min_connections）
      conn_max_lifetime: 1h  # 连接最大生命周期（支持：1h, 30m, 3600s）

      # 性能优化配置
      prepare_stmt: true     # 是否使用预处理语句（提高性能，建议启用）
      disable_fk_migrate: true  # 迁移时是否禁用外键约束（提高性能）

      # 数据库日志配置
      logger:
        level: warn          # 日志级别：silent（无日志）, error, warn, info
        slow_threshold: 200ms  # 慢查询阈值（超过此时间的查询会被记录）
        ignore_record_not_found_error: true  # 是否忽略"记录未找到"错误
        colorful: false      # 是否启用彩色日志输出

      # 表命名策略
      naming:
        table_prefix: ""     # 表名前缀（如 "haruki_" 会使表名变为 haruki_event_147）
        singular_table: false  # 是否使用单数表名（false 则自动复数化）

  # ----------------------------------------------------------------------------
  # 国际服 (EN)
  # ----------------------------------------------------------------------------
  en:
    enabled: false           # 是否启用国际服追踪
    master_data_dir: data/haruki-sekai-en-master/master
    tracker:
      enabled: true
      use_second_level_cron: false
      cron: "*/2 * * * *"
      post_end_user_refresh_interval_secs: 3600
      second_level_track_type: "range"
      range_track_lower_rank: 1
      range_track_upper_rank: 10
      specific_track_ranks: null
      track_specific_players: false
      specific_player_user_ids: null
    gorm_config:
      enabled: true
      dialect: mysql         # 使用 MySQL 数据库
      dsn: "mysql://username:password@localhost:3306/haruki_tracker_en?charset=utf8mb4"
      max_open_conns: 20
      max_idle_conns: 1
      conn_max_lifetime: 1h
      prepare_stmt: true
      disable_fk_migrate: true
      logger:
        level: warn
        slow_threshold: 200ms
        ignore_record_not_found_error: true
        colorful: false
      naming:
        table_prefix: ""
        singular_table: false

  # ----------------------------------------------------------------------------
  # 台服 (TW)
  # ----------------------------------------------------------------------------
  tw:
    enabled: false           # 是否启用台服追踪
    master_data_dir: data/haruki-sekai-tc-master/master
    tracker:
      enabled: true
      use_second_level_cron: false
      cron: "*/2 * * * *"
      post_end_user_refresh_interval_secs: 3600
      second_level_track_type: "range"
      range_track_lower_rank: 1
      range_track_upper_rank: 10
      specific_track_ranks: null
      track_specific_players: false
      specific_player_user_ids: null
    gorm_config:
      enabled: true
      dialect: mysql
      dsn: "mysql://username:password@localhost:3306/haruki_tracker_tw?charset=utf8mb4"
      max_open_conns: 20
      max_idle_conns: 1
      conn_max_lifetime: 1h
      prepare_stmt: true
      disable_fk_migrate: true
      logger:
        level: warn
        slow_threshold: 200ms
        ignore_record_not_found_error: true
        colorful: false
      naming:
        table_prefix: ""
        singular_table: false

  # ----------------------------------------------------------------------------
  # 韩服 (KR)
  # ----------------------------------------------------------------------------
  kr:
    enabled: false           # 是否启用韩服追踪
    master_data_dir: data/haruki-sekai-kr-master/master
    tracker:
      enabled: true
      use_second_level_cron: false
      cron: "*/2 * * * *"
      post_end_user_refresh_interval_secs: 3600
      second_level_track_type: "range"
      range_track_lower_rank: 1
      range_track_upper_rank: 10
      specific_track_ranks: null
      track_specific_players: false
      specific_player_user_ids: null
    gorm_config:
      enabled: true
      dialect: mysql
      dsn: "mysql://username:password@localhost:3306/haruki_tracker_kr?charset=utf8mb4"
      max_open_conns: 20
      max_idle_conns: 1
      conn_max_lifetime: 1h
      prepare_stmt: true
      disable_fk_migrate: true
      logger:
        level: warn
        slow_threshold: 200ms
        ignore_record_not_found_error: true
        colorful: false
      naming:
        table_prefix: ""
        singular_table: false

  # ----------------------------------------------------------------------------
  # 国服 (CN)
  # ----------------------------------------------------------------------------
  cn:
    enabled: false           # 是否启用国服追踪（默认禁用，使用时请改为 true）
    master_data_dir: data/haruki-sekai-sc-master/master  # 国服使用简体中文 Master 数据
    tracker:
      enabled: true
      use_second_level_cron: false
      cron: "*/2 * * * *"
      post_end_user_refresh_interval_secs: 3600
      second_level_track_type: "range"
      range_track_lower_rank: 1
      range_track_upper_rank: 10
      specific_track_ranks: null
      track_specific_players: false
      specific_player_user_ids: null
    gorm_config:
      enabled: true
      dialect: postgres      # 使用 PostgreSQL 数据库
      dsn: "postgres://haruki_user:YOUR_PASSWORD_HERE@localhost:5432/haruki_tracker_cn?sslmode=disable"
      max_open_conns: 20
      max_idle_conns: 1
      conn_max_lifetime: 1h
      prepare_stmt: true
      disable_fk_migrate: true
      logger:
        level: warn
        slow_threshold: 200ms
        ignore_record_not_found_error: true
        colorful: false
      naming:
        table_prefix: ""
        singular_table: false

# ============================================================================
# 配置说明
# ============================================================================
#
# 1. Cron 表达式说明：
#    - 标准 Cron（5 字段）：分 时 日 月 周
#      示例："0 */2 * * *" 表示每 2 小时的整点执行
#    - 秒级 Cron（6 字段，需启用 use_second_level_tracker_cron）：秒 分 时 日 月 周
#      示例："*/30 * * * * *" 表示每 30 秒执行
#
# 2. 数据库 DSN 配置示例：
#    PostgreSQL:
#      "postgres://myuser:mypass@localhost:5432/mydb?sslmode=disable"
#    MySQL:
#      "mysql://myuser:mypass@localhost:3306/mydb?charset=utf8mb4"
#    SQLite:
#      "file:./tracker.db?cache=shared&mode=rwc"
#
# 3. Master data 读取：
#    - 本地目录：data/haruki-sekai-master/master
#    - file URI：file:///app/master/jp
#    - S3/OpenDAL URI：s3://bucket/path/jp/master?region=ap-northeast-1
#    - 当前镜像默认编译 OpenDAL fs / file / http(s) / s3 service。
#
# 4. 性能调优建议：
#    - 高并发场景：优先启用 api_cache/api_query，再按 MySQL max_connections 调整 max_open_conns
#    - 单实例多区服生产建议先保持 max_open_conns 12-20，避免连接数吃满
#    - MySQL 热 trace 查询较多时，innodb_buffer_pool_size 建议至少覆盖活跃事件索引
#
# 5. 日志级别选择：
#    - 开发环境：使用 info 或 warn
#    - 生产环境：使用 warn 或 error
#    - 调试问题：临时使用 info 或 debug
#
# ============================================================================
